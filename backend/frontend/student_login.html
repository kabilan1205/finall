<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRESENZO | Student Login</title>

  <style>
    /* Background gradient animation */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #6a11cb, #2575fc, #ff6a00);
      background-size: 600% 600%;
      animation: gradientBG 16s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Glassmorphic login card */
    .login-box {
      position: relative;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 3rem 2rem;
      width: 95%;
      max-width: 400px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      text-align: center;
      color: #fff;
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from { transform: translateY(-40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .login-box img {
      width: 80px;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #fff;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
    }

    p {
      margin-bottom: 2rem;
      font-size: 14px;
      color: #eee;
    }

    /* Input fields */
    .input-container {
      position: relative;
      margin-bottom: 15px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: inset 0 0 8px rgba(255,255,255,0.2);
    }

    input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    input:focus {
      background: rgba(255,255,255,0.3);
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    /* Show/hide password button */
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      user-select: none;
    }

    /* Button */
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #ff6a00, #ee0979);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button:hover {
      transform: translateY(-3px);
      opacity: 0.95;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .error-msg {
      color: #ff6a6a;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    .options {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 13px;
      color: #fff;
    }

    .options input {
      margin-right: 5px;
    }

    .options a {
      color: #ffb347;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .options a:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Student Icon">
    <h2>Student Portal</h2>
    <p>Login to access your Dashboard</p>

    <form id="loginForm">
      <div class="input-container">
        <input type="text" id="userid" placeholder="User ID" required />
      </div>

      <div class="input-container">
        <input type="password" id="password" placeholder="Password" required />
        <span class="toggle-password" id="togglePassword">👁️</span>
      </div>

      <button type="submit">Login</button>
      <p class="error-msg" id="errorMsg">Invalid credentials</p>

      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot Password?</a>
      </div>
    </form>

    <script>
      // Toggle show/hide password
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", () => {
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);
        togglePassword.textContent = type === "password" ? "👁️" : "🙈";
      });

      // Form submit
      document.addEventListener("DOMContentLoaded", () => {
        const loginForm = document.getElementById("loginForm");
        const errorMsg = document.getElementById("errorMsg");

        loginForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          const userid = document.getElementById("userid").value.trim();
          const password = document.getElementById("password").value.trim();

          try {
            const response = await fetch("http://localhost:5000/api/students/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ userid, password })
            });

            const data = await response.json();

            if (response.ok) {
              localStorage.setItem("studentName", data.student.name);
              localStorage.setItem("studentRegNo", data.student.userid);
              localStorage.setItem("studentClass", data.student.class);
              window.location.href = "student_dashboard.html";
            } else {
              errorMsg.style.display = "block";
              errorMsg.textContent = data.message || "Login failed!";
            }
          } catch (err) {
            console.error(err);
            errorMsg.style.display = "block";
            errorMsg.textContent = "Server error, try again!";
          }
        });
      });
    </script>
  </div>
</body>
</html>
